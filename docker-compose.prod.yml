version: '3.8'

services:
  # 1. PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: gcsp-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gcsp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gcsp_secure_prod_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-gcsp_prod_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gcsp_user} -d ${POSTGRES_DB:-gcsp_prod_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Express Backend API Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gcsp-backend-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-gcsp_user}:${POSTGRES_PASSWORD:-gcsp_secure_prod_password_2026}@postgres:5432/${POSTGRES_DB:-gcsp_prod_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-production-super-secret-jwt-key-2026}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 5242880
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-noreply@govportal.gov}
      SMTP_PASS: ${SMTP_PASS:-app_password_here}
      SMTP_FROM: ${SMTP_FROM:-Government Portal <noreply@govportal.gov>}
    volumes:
      - uploads_prod_data:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # 3. Nginx Frontend Web Server & Proxy
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gcsp-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_prod_data:
  uploads_prod_data:
