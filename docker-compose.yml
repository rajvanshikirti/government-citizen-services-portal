version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gcsp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gcsp_user
      POSTGRES_PASSWORD: gcsp_password
      POSTGRES_DB: gcsp_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
